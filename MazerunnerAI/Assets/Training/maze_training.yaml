behaviors:
  MazeChaser:
    trainer_type: ppo
    max_steps: 10000000
    time_horizon: 256

    hyperparameters:
      batch_size: 4096
      buffer_size: 40960
      learning_rate: 0.0003
      beta: 0.01            # Lower entropy late = more exploitation
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 4
      learning_rate_schedule: linear

    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 3

    reward_signals:
      extrinsic:
        gamma: 0.995        # Higher gamma = values long-term rewards more
        strength: 1.0

    keep_checkpoints: 15
    checkpoint_interval: 500000
    threaded: true
